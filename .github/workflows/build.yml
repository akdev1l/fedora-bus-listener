name: Build

on:
  pull_request:
  push:
    branches:
      - devel

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build RPM
        run: |
          mkdir -p build
          buildah bud \
            -v ${{ github.workspace }}/build:/output \
            -t fedora-bus-listener-builder .
