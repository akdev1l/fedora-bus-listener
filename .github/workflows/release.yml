name: Build and Release

on:
  push:
    tags:
      - '[0-9]*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build RPM
        run: |
          podman build -t fedora-bus-listener-builder .
          mkdir -p build
          podman run --rm \
            -v ${{ github.workspace }}/build:/output \
            fedora-bus-listener-builder

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            build/**/*.rpm
