name: Build and Release

on:
  push:
    tags:
      - 'fedora-bus-listener-*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build RPM
        run: |
          mkdir -p build
          buildah bud \
            -v ${{ github.workspace }}/build:/output \
            -t fedora-bus-listener-builder .

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            build/**/*.rpm
